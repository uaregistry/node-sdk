name: tests

on:
  push:
    branches: [ main ]
  pull_request:

jobs:
  offline-tests:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node-version: ["16", "18", "20", "22", "24"]
    steps:
      - uses: actions/checkout@v5
      - name: Set up Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
      - name: Require check
        run: node -e "console.log(require('./package.json').name, require('.').Client.name)"
      - name: Offline self-test
        run: npm test
